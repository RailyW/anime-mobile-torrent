name: anime_mobile_torrent
description: "Bangumi 与 DMHY 动画资源检索交接工具。"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # 官方 Material/Cupertino 图标与控件资源。
  cupertino_icons: ^1.0.8

  # SVG 品牌图标渲染，用于 Bangumi 官方 favicon 矢量资产。
  flutter_svg: ^2.3.0

  # 应用路由与状态管理。
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2

  # Bangumi API、OAuth WebView 登录、OAuth token 存储、DMHY RSS/HTML 解析。
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1
  webview_flutter: ^4.14.0
  xml: ^7.0.1
  html: ^0.15.6

  # magnet 打开、种子文件缓存、分享交接、用户手动选择视频文件和外部播放器打开。
  url_launcher: ^6.3.2
  path_provider: ^2.1.6
  share_plus: ^13.1.0
  file_selector: ^1.1.0
  open_filex: ^4.7.0

  # 远程图片文件缓存，用于 Bangumi 封面、详情头图和用户头像。
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Android 前台服务，用于用户显式开启的后台常驻通知和后续订阅检查挂点。
  flutter_foreground_task: ^9.2.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/branding/bangumi_favicon_full_size.svg
